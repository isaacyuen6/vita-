name: vita-ai

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: vita
      POSTGRES_USER: vita
      POSTGRES_PASSWORD: vita_local_only
    ports: ['5432:5432']
    volumes: ['postgres-data:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vita -d vita']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports: ['6379:6379']
    volumes: ['redis-data:/data']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vita-local
      MINIO_ROOT_PASSWORD: change-me-local-only
    ports: ['9000:9000', '9001:9001']
    volumes: ['minio-data:/data']
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 3s
      retries: 10

  ai-service:
    build: ./apps/ai-service
    ports: ['8000:8000']
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      API_HOST: 0.0.0.0
      API_PORT: 3000
      API_CORS_ORIGINS: http://localhost:8081
      DATABASE_URL: postgresql://vita:vita_local_only@postgres:5432/vita
      REDIS_URL: redis://redis:6379
    ports: ['3000:3000']
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      ai-service: { condition: service_healthy }
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3000/v1/ready').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  minio-data:
